<!DOCTYPE html>
<html>

<head>

<title>Home</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
	.home-shell {
		max-width: 1100px;
		margin: 44px auto 28px;
		padding: 0 14px 24px;
	}

	.hero-card {
		background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(15, 118, 110, 0.72));
		border: 1px solid rgba(255, 255, 255, 0.16);
		border-radius: 22px;
		padding: 30px;
		color: #f8fafc;
		box-shadow: 0 20px 50px rgba(2, 8, 23, 0.3);
		position: relative;
		overflow: hidden;
	}

	.hero-card::before {
		content: "";
		position: absolute;
		left: 18px;
		right: 18px;
		top: 12px;
		height: 1px;
		background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
	}

	.hero-card::after {
		content: "";
		position: absolute;
		width: 220px;
		height: 220px;
		right: -60px;
		top: -80px;
		border-radius: 50%;
		background: radial-gradient(circle, rgba(34, 211, 238, 0.35), transparent 70%);
		pointer-events: none;
	}

	.hero-subtitle {
		margin: 0;
		opacity: 1;
		font-size: 0.98rem;
		letter-spacing: 0.3px;
		color: #bfdbfe !important;
	}

	.welcome-title {
		margin: 8px 0 18px;
		font-size: clamp(1.8rem, 3.1vw, 2.6rem);
		color: #f8fafc !important;
	}

	.profile-strip {
		display: grid;
		grid-template-columns: 88px 1fr;
		gap: 16px;
		align-items: center;
		background: rgba(255, 255, 255, 0.12);
		border: 1px solid rgba(255, 255, 255, 0.24);
		border-radius: 16px;
		padding: 14px;
		max-width: 540px;
	}

	.profile-avatar-lg {
		width: 72px;
		height: 72px;
		border-radius: 50%;
		background: rgba(255, 255, 255, 0.2);
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.profile-name-lg {
		font-size: 1.45rem;
		font-weight: 800;
		margin: 0;
		color: #f8fafc !important;
	}

	.profile-meta {
		margin-top: 2px;
		opacity: 1;
		color: #e2e8f0 !important;
	}


	.actions-panel {
		margin-top: 22px;
		background: rgba(255, 255, 255, 0.94);
		border-radius: 18px;
		border: 1px solid rgba(15, 23, 42, 0.08);
		box-shadow: 0 14px 30px rgba(2, 8, 23, 0.12);
		padding: 18px;
	}

	.actions-panel .actions-title {
		margin: 0 0 12px;
		font-size: 1.05rem;
		color: #0f172a !important;
	}

	.action-buttons {
		margin-top: 0;
		gap: 10px;
	}

	.action-btn {
		border-radius: 10px;
		padding: 12px 24px;
	}

	@media (max-width: 760px) {
		.profile-strip {
			grid-template-columns: 1fr;
			text-align: center;
			justify-items: center;
		}

	}
</style>

</head>

<body class="home-page">

<header class="header">
	<div class="logo">
		<img src="https://labs.iitgn.ac.in/muselaboratory/wp-content/uploads/2020/10/iitgnlogo-emblem.png" height="60">
		<span>IITGN CallHub</span>
	</div>
	<div class="profile-box">
		<div class="profile-avatar">
			<svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="24" fill="#eee"/><circle cx="24" cy="20" r="10" fill="#bbb"/><ellipse cx="24" cy="38" rx="14" ry="8" fill="#bbb"/></svg>
		</div>
		<div class="profile-name">{{ name }}</div>
		<button id="logout-link" class="logout-btn-red">Logout</button>
	</div>
</header>

<div class="home-shell">
	<section class="hero-card">
		<p class="hero-subtitle">Directory Intelligence Platform</p>
		<h1 class="welcome-title">Welcome to IIT Gandhinagar CallHub!</h1>

		<div class="profile-strip">
			<div class="profile-avatar-lg">
				<svg width="64" height="64" viewBox="0 0 48 48"><circle cx="24" cy="24" r="24" fill="#dbeafe"/><circle cx="24" cy="20" r="10" fill="#93c5fd"/><ellipse cx="24" cy="38" rx="14" ry="8" fill="#93c5fd"/></svg>
			</div>
			<div>
				<p class="profile-name-lg">{{ name }}</p>
				<div class="profile-meta">{{ role }} | ID: {{username}}</div>
			</div>
		</div>

	</section>

	<section class="actions-panel">
		<h3 class="actions-title">Quick Actions</h3>
		<div class="action-buttons">
			<a href="/portfolio" class="action-btn main">My Portfolio</a>
			<a href="/create" class="action-btn">Create</a>
			<a href="/read" class="action-btn">Read</a>
			<a href="/update" class="action-btn">Update</a>
			<a href="/delete" class="action-btn">Delete</a>
		</div>
	</section>
</div>

<!-- Logout Confirmation Modal -->
<div id="logout-modal" class="modal" style="display:none;">
	<div class="modal-content">
		<span class="modal-title">Are you sure you want to logout?</span>
		<div class="modal-actions">
			<button id="confirm-logout" class="modal-btn confirm">Logout</button>
			<button id="cancel-logout" class="modal-btn cancel">Cancel</button>
		</div>
	</div>
</div>

<script>
// Logout confirmation modal logic
document.getElementById('logout-link').addEventListener('click', function(e) {
	e.preventDefault();
	document.getElementById('logout-modal').style.display = 'flex';
});
document.getElementById('cancel-logout').addEventListener('click', function() {
	document.getElementById('logout-modal').style.display = 'none';
});
document.getElementById('confirm-logout').addEventListener('click', function() {
	window.location.href = '/logout';
});
</script>



</body>

</html>
