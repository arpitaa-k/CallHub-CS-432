<!DOCTYPE html>
<html>

<head>
<title>View Records</title>
<link rel="stylesheet" href="F:\Call_Hub-WebDEv\static\css\style.css">
</head>

<body>

<header class="header">

<img src="https://labs.iitgn.ac.in/muselaboratory/wp-content/uploads/2020/10/iitgnlogo-emblem.png" class="logo">
<h2>CallHub Dashboard</h2>

<div class="user-info">
Welcome {{username}}
</div>

</header>


<div class="container">

<h1>Database Records</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
</tr>

{% for row in members %}

<tr>
<td>{{row.id}}</td>
<td>{{row.name}}</td>
<td>{{row.email}}</td>
<td>{{row.phone}}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/home">
<button>Back to Home</button>
</a>

</div>

</body>
</html>
