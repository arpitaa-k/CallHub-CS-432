<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="home-page">
<header class="header">
<div class="logo">
<img src="https://labs.iitgn.ac.in/muselaboratory/wp-content/uploads/2020/10/iitgnlogo-emblem.png" height="60">
<span>IITGN Dictionary</span>
</div>
<div class="user" id="header-user">
    <span id="user-info">Welcome {{member_id}}</span>
    <a href="/logout" class="logout-btn">Logout</a>
</div>
</header>
<div class="content">
<h2>My Portfolio</h2>
<div id="portfolio-data">
<!-- Portfolio data will be loaded here -->
</div>
</div>
<footer class="footer">
<div class="crud-box">
<a href="/home">Home</a>
</div>
</footer>
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/member/{{member_id}}/portfolio')
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById('portfolio-data').innerHTML = '<p>' + data.error + '</p>';
            return;
        }

        // Update header with name and optional profile image
        try {
            const name = data.member && data.member.full_name ? data.member.full_name : ('User ' + {{member_id}});
            let imgUrl = data.member && data.member.profile_image_url ? data.member.profile_image_url : null;
            // If image value is a filename (no protocol), use a placeholder URL; you can change to a local static path if you host images.
            if (imgUrl && !/^https?:\/\//i.test(imgUrl)) {
                imgUrl = 'https://via.placeholder.com/28';
            }
            const userInfo = document.getElementById('user-info');
            if (imgUrl) {
                userInfo.innerHTML = `<img src="${imgUrl}" alt="avatar" height="28" style="vertical-align:middle;margin-right:8px;border-radius:50%"> ${name}`;
            } else {
                userInfo.textContent = 'Welcome ' + name;
            }
        } catch (e) {
            // ignore header update failures
        }

        // Build portfolio HTML using object fields returned by the API
        let html = '<h3>Member Info</h3>';
        if (data.member) {
            html += '<p>Name: ' + (data.member.full_name || '') + '</p>';
            html += '<p>Designation: ' + (data.member.designation || '') + '</p>';
        }

        html += '<h3>Contacts</h3><ul>';
        (data.contacts || []).forEach(c => {
            html += '<li>' + (c.contact_type || '') + ': ' + (c.contact_value || '') + '</li>';
        });
        html += '</ul>';

        html += '<h3>Locations</h3><ul>';
        (data.locations || []).forEach(l => {
            html += '<li>' + (l.location_type || '') + ': ' + (l.building_name || '') + ' ' + (l.room_number || '') + '</li>';
        });
        html += '</ul>';

        html += '<h3>Emergency Contacts</h3><ul>';
        (data.emergency_contacts || []).forEach(e => {
            html += '<li>' + (e.contact_person_name || '') + ' (' + (e.relation || '') + '): ' + (e.emergency_phone || '') + '</li>';
        });
        html += '</ul>';

        document.getElementById('portfolio-data').innerHTML = html;
    })
    .catch(err => {
        document.getElementById('portfolio-data').innerHTML = '<p>Error loading portfolio</p>';
    });
});
</script>
</body>
</html>
